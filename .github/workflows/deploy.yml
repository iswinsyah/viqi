name: Auto Deploy to Hostinger

# Trigger deploy otomatis setiap ada push ke branch 'main'
on:
  push:
    branches:
      - main 
      # Jika branch utama Anda bernama 'master', ganti 'main' di atas menjadi 'master'

  # Mengizinkan deploy dijalankan secara manual (tombol 'Run workflow' di GitHub)
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files to Hostinger via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: './'
        server-dir: './'
        timeout: 300000
        # Jika perlu, uncomment baris exclude berikut untuk mengecualikan file tertentu.
        # exclude: |
        #   **/.git*
        #   **/.git*/**
        #   **/README.md
