name: Auto Deploy to Hostinger

# Trigger deploy otomatis setiap ada push ke branch 'main'
on:
  push:
    branches:
      - main 
      # Jika branch utama Anda bernama 'master', ganti 'main' di atas menjadi 'master'

  # Mengizinkan deploy dijalankan secara manual (tombol 'Run workflow' di GitHub)
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files to Hostinger via SFTP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SFTP_SERVER }}
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        port: 22
        protocol: sftp
        source: "./"
        target: "/public_html"
        rm: true
        strip_components: 0

    # Jika Hostinger tidak mendukung SFTP dan Anda perlu kembali ke FTP,
    # cukup ganti kembali langkah di atas dengan SamKirkland/FTP-Deploy-Action.
    # - name: 📂 Sync files to Hostinger
    #   uses: SamKirkland/FTP-Deploy-Action@v4.3.5
